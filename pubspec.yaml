name: avdibook
description: A premium Material 3 expressive audiobook player built with Flutter.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.1.0

  # Fonts
  google_fonts: ^8.0.2
  dynamic_color: ^1.7.0

  # Audio playback + background service
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  audio_session: ^0.2.2

  # Local database — Drift (SQL, fully Dart 3 compatible)
  drift: ^2.32.0
  drift_flutter: ^0.3.0

  # File system
  path_provider: ^2.1.5
  path: ^1.9.1
  collection: ^1.19.1

  # Simple key-value storage (settings, onboarding state)
  shared_preferences: ^2.5.4

  # File import
  file_picker: ^10.3.10
  permission_handler: ^12.0.1
  device_info_plus: ^12.3.0
  mime: ^2.0.0
  audio_metadata_reader: ^1.4.2
  sensors_plus: ^6.1.2

  # Color extraction from cover art
  palette_generator: ^0.3.3+7

  # Utilities
  intl: ^0.20.2
  equatable: ^2.0.5
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.32.0
  # riverpod_generator: ^4.0.3
  # riverpod_lint: ^3.1.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/covers/
    - assets/icons/
    - assets/mock_data/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
